server:
  port: 8080

spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/db_admin_test?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: dbadmin
    password: dbadmin123
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  redis:
    host: localhost
    port: 6379
    # password: yourpassword   # uncomment if Redis requires auth
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 4
        min-idle: 1

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # remove in prod
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# DB Admin Panel config
db-admin:
  # Max rows returned per page (hard cap to prevent full-table dumps)
  max-page-size: 200
  # Tables completely blocked from the admin panel (comma-separated)
  # Even with no-auth mode, these will never be exposed
  blocked-tables:
    - flyway_schema_history
    - DATABASECHANGELOG
    - DATABASECHANGELOGLOCK
  # Allowed schemas exposed in the UI.
  # If empty, defaults to the schema in the JDBC URL (original behaviour).
  allowed-schemas:
    - db_admin_test
    - shop_db
    - cms_db
